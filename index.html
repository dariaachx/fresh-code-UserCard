<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/c446d557b2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <title>User Card</title>
</head>
<body>
    <div class="container">
        <div class="info-container">
            <div class="adress-container">
                <p>New York City, NY</p>
            </div>
            <div class="image-container">
                <img src="./assets/images/margot.jpg" alt="photo" class="photo">
            </div>
            <div class="text-container">
                <div class="header-container">
                    <h1>Margot Robbie</h1>
                </div>
                <div class="desc-container">
                    <p>Margot Robbie was born in Dalby, Queensland, Australia and raised on the Gold Coast</p>
                </div>
            </div>
            <div class="button">
                <button>Follow</button>
            </div>
        </div>


        <div class="footer">
            <div class="footer-container">
                <div class="img-footer">
                    <i class="fa-solid fa-image" style="color: rgb(177, 68, 68);"></i>
                </div>
                <div class="text-footer">
                    <div class="name-footer">
                        <p>Posts</p>
                    </div>
                    <div class="num-footer">
                        <p>635</p>
                    </div>
                </div>
            </div>
            <div class="footer-container slash">
                <div class="img-footer">
                    <i class="fa-regular fa-heart" style="color: rgb(177, 68, 68);"></i>
                </div>
                <div class="text-footer">
                    <div class="name-footer">
                        <p>Favorites</p>
                    </div>
                    <div class="num-footer">
                        <p>3,472</p>
                    </div>
                </div>
            </div>
            <div class="footer-container slash">
                <div class="img-footer">
                    <i class="fa-regular fa-message" style="color: rgb(177, 68, 68);"></i>
                </div>
                <div class="text-footer">
                    <div class="name-footer">
                        <p>Messages</p>
                    </div>
                    <div class="num-footer">
                        <p>1,293</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
